<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Thumbnail — Tu agente IA 24/7 (centered, crop-proof)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0A0A0C;
    color: #FBE8D9;
    font-family: 'Inter', sans-serif;
    padding: 48px 120px 52px 120px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    row-gap: 20px;
    line-height: 1;
    text-align: center;
  }

  .top-row {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.25em;
  }
  .top-row .eyebrow { color: #FF5941; }
  .top-row .sep { color: #88898C; margin: 0 16px; }
  .top-row .issue { color: #88898C; }

  .hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    overflow: hidden;
    min-height: 0;
  }

  .headline {
    font-family: 'Manrope', sans-serif;
    font-size: 140px;
    font-weight: 800;
    line-height: 0.88;
    letter-spacing: -0.04em;
    color: #FBE8D9;
  }
  .headline .accent { color: #FF5941; }

  .data-line {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .data-primary {
    font-family: 'Manrope', sans-serif;
    font-size: 46px;
    font-weight: 800;
    color: #D4FF3A;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .data-divider {
    width: 4px;
    height: 4px;
    background: #88898C;
    border-radius: 50%;
    transform: translateY(-10px);
  }

  .data-meta {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: #FBE8D9;
    opacity: 0.85;
  }

  .bottom-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
  }

  .brand-mark { display: flex; align-items: center; gap: 12px; }

  .cursor {
    width: 4px;
    height: 22px;
    background: #FF5941;
  }

  .brand-name {
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #FBE8D9;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .dot {
    width: 4px;
    height: 4px;
    background: #88898C;
    border-radius: 50%;
  }

  .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #88898C;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    line-height: 1.2;
  }
</style>
</head>
<body>

  <div class="top-row">
    <span class="eyebrow">Modo Build</span><span class="sep">&middot;</span><span class="eyebrow">Tutorial</span><span class="sep">&middot;</span><span class="issue">NO.02</span>
  </div>

  <div class="hero">
    <h1 class="headline">
      TU AGENTE IA<br>
      24<span class="accent">/</span>7
    </h1>
    <div class="data-line">
      <span class="data-primary">$3.49/mes</span>
      <span class="data-divider"></span>
      <span class="data-meta">OpenClaw &middot; Claude Code &middot; cero código</span>
    </div>
  </div>

  <div class="bottom-row">
    <div class="brand-mark">
      <div class="cursor"></div>
      <span class="brand-name">Modo Build</span>
    </div>
    <div class="dot"></div>
    <span class="date">03 / 16 / 2026</span>
  </div>

</body>
</html>
