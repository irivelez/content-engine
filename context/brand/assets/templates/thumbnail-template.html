<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Thumbnail Template — Modo Build (reusable)</title>
<!--
  REUSABLE THUMBNAIL TEMPLATE — Modo Build
  Adopted: 2026-04-16

  HOW TO USE:
  1. Copy this file, rename to thumbnail-[DATE]-[SLUG].html
  2. Replace all [PLACEHOLDERS]
  3. Render to PNG at 1200x630 via headless Chrome:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
       --headless=new --disable-gpu --hide-scrollbars \
       --window-size=1200,630 --virtual-time-budget=5000 \
       --screenshot=output/newsletter/assets/thumbnail-[DATE]-[SLUG].png \
       "file:///path/to/thumbnail-[DATE]-[SLUG].html"
  4. Upload to Beehiiv as the post's featured image

  LAYOUT: Centered (crop-proof for Beehiiv card grid — survives ~200px crop per side)

  PALETTE:
    Obsidian #0A0A0C — background
    Paper    #FBE8D9 — headline text
    Coral    #FF5941 — brand accent, cursor, eyebrow, accent characters
    Lime     #D4FF3A — DATA WEAPON (key number/metric) — MAX 1 per composition, obsidian bg ONLY
    Titanium #88898C — secondary metadata

  TYPOGRAPHY:
    Manrope  — headline + brand mark
    Inter    — meta text
    JetBrains Mono — eyebrows, dates, data labels

  BRAND MARK: Coral cursor block + "MODO BUILD" wordmark (bottom center)

  DESIGN PRINCIPLES:
    - Typography IS the design — no glows, no gradients, no corner brackets, no grid bg
    - One coral accent + one optional lime data element per thumbnail
    - Hero headline dominates — 120-140pt Manrope 800 (scale per headline length)
    - Data line = the proof point (specific number that earns the click) — OPTIONAL, omit if no strong number
    - All content CENTERED — crop-proof for Beehiiv card grid
    - Brand mark bottom-center = signature (don't skip)
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0A0A0C;
    color: #FBE8D9;
    font-family: 'Inter', sans-serif;
    padding: 48px 120px 52px 120px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    row-gap: 20px;
    line-height: 1;
    text-align: center;
  }

  /* ==== Top row ==== */
  .top-row {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.25em;
  }
  .top-row .eyebrow { color: #FF5941; }
  .top-row .sep { color: #88898C; margin: 0 16px; }
  .top-row .issue { color: #88898C; }

  /* ==== Hero ==== */
  .hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    overflow: hidden;
    min-height: 0;
  }

  /* Optional pre-headline — italic provocation above headline */
  .preheadline {
    font-family: 'Inter', sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    line-height: 1.3;
    color: #FBE8D9;
    opacity: 0.85;
    max-width: 800px;
  }
  .preheadline .emphasis {
    color: #FF5941;
    opacity: 1;
    font-weight: 500;
  }

  .headline {
    font-family: 'Manrope', sans-serif;
    font-size: 136px;        /* SCALE as needed: 110-140pt depending on headline length */
    font-weight: 800;
    line-height: 0.88;
    letter-spacing: -0.04em;
    color: #FBE8D9;
  }
  .headline .accent { color: #FF5941; }

  /* Optional data line — lime data weapon + meta context */
  .data-line {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .data-primary {
    font-family: 'Manrope', sans-serif;
    font-size: 46px;
    font-weight: 800;
    color: #D4FF3A;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .data-divider {
    width: 4px;
    height: 4px;
    background: #88898C;
    border-radius: 50%;
    transform: translateY(-10px);
  }

  .data-meta {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: #FBE8D9;
    opacity: 0.85;
  }

  /* Meta line — no data number, just context (alternative to data-line) */
  .meta-line {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #FBE8D9;
    opacity: 0.7;
  }
  .meta-line .mono {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.02em;
  }
  .meta-line .sep { color: #88898C; margin: 0 10px; }

  /* ==== Bottom row ==== */
  .bottom-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
  }

  .brand-mark { display: flex; align-items: center; gap: 12px; }

  .cursor {
    width: 4px;
    height: 22px;
    background: #FF5941;
  }

  .brand-name {
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #FBE8D9;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .dot {
    width: 4px;
    height: 4px;
    background: #88898C;
    border-radius: 50%;
  }

  .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #88898C;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    line-height: 1.2;
  }
</style>
</head>
<body>

  <div class="top-row">
    <span class="eyebrow">Modo Build</span><span class="sep">&middot;</span><span class="eyebrow">[CATEGORY]</span><span class="sep">&middot;</span><span class="issue">NO.[N]</span>
  </div>

  <div class="hero">
    <!-- OPTION A: Pre-headline + headline (no data number) — use when copy IS the hook -->
    <!--
    <p class="preheadline">
      [PROVOCATIVE STATEMENT] <span class="emphasis">[EMPHASIS PHRASE].</span>
    </p>
    -->

    <h1 class="headline">
      [HEADLINE LINE 1]<br>
      <span class="accent">/</span>[HEADLINE LINE 2]
    </h1>

    <!-- OPTION B: Data line with lime weapon — use when a specific number earns the click -->
    <div class="data-line">
      <span class="data-primary">[$DATA / METRIC]</span>
      <span class="data-divider"></span>
      <span class="data-meta">[supporting context &middot; detail]</span>
    </div>

    <!-- OPTION C: Meta line without number — use when context matters but no strong data -->
    <!--
    <div class="meta-line">
      <span class="mono">[/command]</span><span class="sep">&middot;</span>[Tool]<span class="sep">&middot;</span>[context]
    </div>
    -->
  </div>

  <div class="bottom-row">
    <div class="brand-mark">
      <div class="cursor"></div>
      <span class="brand-name">Modo Build</span>
    </div>
    <div class="dot"></div>
    <span class="date">[MM / DD / YYYY]</span>
  </div>

</body>
</html>
